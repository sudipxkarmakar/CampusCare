<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Central Library | Principal Portal | CampusCare</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/design-system.css?v=1.6">
  <style>
      .fa-solid, .fas, .fa-regular { font-family: "Font Awesome 6 Free" !important; }

      .search-container {
          background: var(--bg-color);
          padding: 15px;
          border-radius: var(--radius-lg);
          display: flex;
          flex-wrap: wrap;
          gap: 15px;
          border: 1px solid var(--border-color);
          align-items: center;
          margin-bottom: 2rem;
      }
      
      .search-input {
          flex: 1;
          border: none;
          outline: none;
          font-size: 1rem;
          color: var(--text-dark);
          min-width: 200px;
          background: transparent;
          font-family: 'Inter', sans-serif;
      }
      
      .filter-select {
          padding: 10px 15px;
          border: 1px solid var(--border-color);
          border-radius: var(--radius-md);
          outline: none;
          background: var(--bg-color);
          color: var(--text-dark);
          font-family: 'Inter', sans-serif;
      }
      
      .book-card {
          background: var(--bg-color);
          border-radius: var(--radius-lg);
          padding: 1.5rem;
          text-align: center;
          border: 1px solid var(--border-color);
          transition: transform 0.2s, box-shadow 0.2s;
          display: flex;
          flex-direction: column;
      }
      
      .book-card:hover {
          transform: translateY(-5px);
          box-shadow: var(--shadow-md);
      }
      
      .book-cover {
          width: 100px;
          height: 140px;
          background: rgba(0,0,0,0.03);
          margin: 0 auto 1rem auto;
          border-radius: var(--radius-sm);
          display: flex;
          align-items: center;
          justify-content: center;
          border: 1px solid var(--border-color);
      }
      
      .book-category {
          font-size: 0.75rem;
          background: rgba(0,0,0,0.05);
          color: var(--text-muted);
          padding: 2px 8px;
          border-radius: 10px;
          font-weight: 500;
          display: inline-block;
          margin-top: auto;
      }
  </style>
</head>

<body>
  <div class="dashboard-wrapper modern-layout">
    
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <a href="../index.html" class="logo-container">
        <img src="../assets/images/hero-illustration.png" alt="Logo" class="logo-icon" onerror="this.src='https://ui-avatars.com/api/?name=CC&background=6b46c1&color=fff&rounded=true'"/>
        <div class="logo-text">CampusCare</div>
      </a>

      <div class="sidebar-portal-text" style="padding: 0 24px; margin-bottom: 8px; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">
        Principal Portal
      </div>

      <ul class="nav-menu">
        <li><a href="index.html" class="nav-item"><i class="fa-solid fa-house-chimney"></i> Dashboard</a></li>
        <li><a href="students.html" class="nav-item"><i class="fa-solid fa-user-graduate"></i> All Students</a></li>
        <li><a href="teachers.html" class="nav-item"><i class="fa-solid fa-person-chalkboard"></i> All Teachers</a></li>
        <li><a href="hods.html" class="nav-item"><i class="fa-solid fa-user-tie"></i> HODs</a></li>
        <li><a href="wardens.html" class="nav-item"><i class="fa-solid fa-user-shield"></i> Wardens</a></li>
        <li><a href="complaints_review.html" class="nav-item"><i class="fa-solid fa-list-check"></i> Complaints</a></li>
        <li><a href="notices.html" class="nav-item"><i class="fa-solid fa-bullhorn"></i> Global Notices</a></li>
        <li><a href="library.html" class="nav-item active"><i class="fa-solid fa-book"></i> Central Library</a></li>
      </ul>

      <div class="sidebar-bottom">
        <a id="logoutBtn" href="javascript:void(0)" class="nav-item" data-action="logout" style="color: var(--danger);"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      
      <!-- TOP NAVBAR -->
      <header class="top-navbar">
        <div class="nav-left" style="display: flex; align-items: center; gap: 32px">
          <h1 style="margin: 0; font-size: 1.8rem; font-weight: 700; color: var(--text-dark);">
            CampusCare <span style="font-size: 0.8rem; background: var(--primary); color: white; padding: 4px 10px; border-radius: var(--radius-full); vertical-align: middle; margin-left: 8px;">PRINCIPAL</span>
          </h1>
        </div>
        
        <div class="nav-right" style="display: flex; align-items: center; gap: 20px">
          <!-- USER PROFILE -->
          <div id="userProfile" class="user-profile" data-action="toggleProfileMenu" aria-label="Toggle Profile Menu" aria-expanded="false" aria-haspopup="menu" style="display: flex; cursor: pointer; position: relative">
            <img id="userAvatar" class="user-avatar" src="https://ui-avatars.com/api/?name=Principal&background=random" alt="Profile" />
            <div style="display: flex; flex-direction: column;">
                <span id="userName" class="user-name" style="cursor: pointer; margin-bottom: 2px;">Hi, Principal</span>
                <span id="userRole" style="font-size: 0.75rem; color: var(--text-muted);">Principal</span>
            </div>
            
            <!-- DROPDOWN MENU -->
            <div id="profileMenu" style="display: none; position: absolute; top: calc(100% + 10px); right: 0; background: var(--bg-color); padding: 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); z-index: 1000; border: 1px solid var(--border-color); animation: fadeIn 0.2s ease; min-width: 250px;">
              <p style="border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">
                Account Details
              </p>
              <div id="userDetails" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.5;">
                <!-- dynamically injected from js -->
              </div>
              <button style="background: var(--danger); color: white; border: none; padding: 0.6rem; width: 100%; border-radius: var(--radius-md); cursor: pointer; font-weight: 500;">
                  <i class="fa-solid fa-right-from-bracket"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- HERO -->
      <section class="hero-card" style="background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); color: white;">
        <div class="hero-content" style="max-width: 100%;">
          <h1 style="font-size: 2rem; margin-bottom: 8px; color: white;">Central Library</h1>
          <p style="font-size: 1rem; opacity: 0.9; margin: 0;">Browse and Manage Library Resources</p>
        </div>
      </section>

      <!-- SEARCH and FILTERS -->
      <section class="section-card">
          <div class="search-container">
              <i class="fa-solid fa-search" style="color: var(--text-muted); font-size: 1.2rem;"></i>
              <input type="text" id="searchInput" placeholder="Search by Title..." class="search-input">

              <select id="categoryFilter" class="filter-select">
                  <option value="">All Categories</option>
                  <option value="CSE">CSE</option>
                  <option value="IT">IT</option>
                  <option value="ECE">ECE</option>
                  <option value="CIVIL">CIVIL</option>
                  <option value="General">General</option>
              </select>

              <button class="btn-filled-purple" style="padding: 10px 25px; font-weight: 600;">Search</button>
          </div>

          <!-- BOOK GRID -->
          <div id="bookList" class="triple-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem;">
              <div style="grid-column: 1/-1; text-align:center; padding:4rem; color: var(--text-muted);">
                  <i class="fa-solid fa-circle-notch fa-spin fa-2x" style="color: var(--primary); margin-bottom: 10px; display: block;"></i>
                  Loading library...
              </div>
          </div>
      </section>

    </main>
  </div>

  <script src="../assets/js/landing.js"></script>
  <script>
      const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:5000' : 'https://campuscare-backend-96cn.onrender.com') + '/api';

      document.addEventListener('DOMContentLoaded', () => {
          checkAuth();
          
          const searchInput = document.getElementById('searchInput');
          const categoryFilter = document.getElementById('categoryFilter');
          const bookList = document.getElementById('bookList');

          // Debounce Timer
          let timeout = null;

          // Load Initial Books
          fetchBooks();

          // Event Listeners
          searchInput.addEventListener('input', () => {
              clearTimeout(timeout);
              timeout = setTimeout(fetchBooks, 300); // 300ms debounce
          });

          categoryFilter.addEventListener('change', fetchBooks);

          async function fetchBooks() {
              const search = searchInput.value.trim();
              const category = categoryFilter.value;

              // Build Query URL
              const queryParams = new URLSearchParams({
                  search,
                  category: category === "" ? "" : category
              });

              try {
                  const res = await fetch(`${API_URL}/library?${queryParams}`);
                  if (!res.ok) {
                      const errorData = await res.json();
                      throw new Error(errorData.message || 'Failed to fetch books');
                  }
                  const books = await res.json();
                  renderBooks(books);
              } catch (error) {
                  console.error(error);
                  bookList.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:3rem; color:var(--danger);"><i class="fa-solid fa-circle-exclamation fa-2x" style="margin-bottom:1rem; display:block;"></i>${error.message}</div>`;
              }
          }

          function renderBooks(books) {
              if (books.length === 0) {
                  bookList.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:4rem; color:var(--text-muted);"><i class="fa-solid fa-book-open" style="font-size:3rem; margin-bottom:1rem; display:block; color:var(--border-color);"></i>No books found matching your criteria.</div>`;
                  return;
              }

              let html = '';
              books.forEach(book => {
                  html += `
                  <div class="book-card">
                      <div class="book-cover">
                          <i class="fa-solid fa-book" style="font-size:2.5rem; color:var(--text-muted);"></i>
                      </div>
                      
                      <h3 style="font-size:1rem; margin:0 0 5px 0; color:var(--text-dark); font-weight:700; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;" title="${book.title}">${book.title}</h3>
                      <p style="font-size:0.85rem; color:var(--text-muted); margin:0 0 15px 0;">${book.author}</p>
                      
                      <div style="margin-top:auto;">
                          <span class="book-category">${book.category}</span>
                      </div>
                  </div>
                  `;
              });

              bookList.innerHTML = html;
          }
      });
      
      function checkAuth() {
          const userStr = localStorage.getItem('user');
          if (!userStr) {
              window.location.href = '../index.html';
              return;
          }
          const user = JSON.parse(userStr);
          if (user.role !== 'principal' && user.role !== 'admin') {
              alert('Unauthorized Access');
              window.location.href = '../index.html';
              return;
          }

          document.getElementById('userProfile').style.display = 'flex';
          document.getElementById('userName').innerText = `Hello, ${user.name}`;
          document.getElementById('userDetails').innerHTML = `<strong>${user.role.toUpperCase()}</strong><br>${user.email}<br>Campus Admin`;
          document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${user.name}&background=random`;
      }

      function toggleProfileMenu() {
          const menu = document.getElementById('profileMenu');
          if (menu.style.display === 'none' || menu.style.display === '') {
              menu.style.display = 'block';
          } else {
              menu.style.display = 'none';
          }
      }

      function logout() {
          localStorage.removeItem('user');
          window.location.href = '../index.html';
      }
  </script>
</body>
</html>
