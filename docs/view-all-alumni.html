<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alumni Network | CampusCare</title>
  <meta name="description" content="Connect with AEC alumni — browse profiles and reach out via WhatsApp." />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/design-system.css?v=1.4" />
  <style>
    body { background: #e2e8f0 !important; padding: 0 !important; }
    .page-wrap { max-width: 1300px; margin: 0 auto; padding: 40px 32px; }
    .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 36px; flex-wrap: wrap; }
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--primary-light); color: var(--primary);
      padding: 10px 20px; border-radius: var(--radius-full);
      text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: all 0.2s;
    }
    .back-btn:hover { background: var(--primary); color: white; }
    .page-title { font-size: 1.8rem; font-weight: 700; color: var(--text-dark); }
    .page-title span { color: var(--primary); }
    .search-bar-wrap { position: relative; margin-bottom: 32px; max-width: 480px; }
    .search-bar-wrap input {
      width: 100%; padding: 12px 20px 12px 44px;
      border: 1px solid var(--border-color); border-radius: var(--radius-full);
      font-size: 0.95rem; outline: none; background: white; font-family: inherit;
    }
    .search-bar-wrap input:focus { border-color: var(--primary); }
    .search-bar-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .alumni-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .alumni-card {
      background: white; border-radius: var(--radius-lg); padding: 28px;
      box-shadow: var(--shadow-md); border: 1px solid var(--border-color);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .alumni-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
    .alumni-avatar {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--primary-light); margin-bottom: 16px;
    }
    .alumni-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .alumni-role { font-size: 0.85rem; color: var(--primary); font-weight: 600; margin-bottom: 4px; }
    .alumni-company { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px; }
    .alumni-quote {
      font-size: 0.82rem; color: var(--text-muted); font-style: italic;
      margin-bottom: 20px; line-height: 1.5; flex: 1;
    }
    .alumni-year-badge {
      display: inline-block; background: var(--primary-light); color: var(--primary);
      padding: 3px 12px; border-radius: var(--radius-full);
      font-size: 0.75rem; font-weight: 600; margin-bottom: 16px;
    }
    .wa-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #25d366; color: white; padding: 10px 20px;
      border-radius: var(--radius-full); text-decoration: none;
      font-weight: 600; font-size: 0.88rem; transition: all 0.2s; width: 100%;
    }
    .wa-btn:hover { background: #1da851; transform: scale(1.02); }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-muted); }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 16px; opacity: 0.4; }
    .stats-banner {
      display: flex; gap: 16px; margin-bottom: 32px;
      background: white; border-radius: var(--radius-lg); padding: 24px;
      box-shadow: var(--shadow-sm); flex-wrap: wrap;
    }
    .stat-banner-item { flex: 1; min-width: 100px; text-align: center; }
    .stat-banner-item h3 { font-size: 1.6rem; color: var(--primary); margin-bottom: 4px; }
    .stat-banner-item p { font-size: 0.8rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="page-header">
      <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
      <div>
        <h1 class="page-title"><i class="fa-solid fa-graduation-cap" style="color:var(--primary);"></i> Alumni <span>Network</span></h1>
        <p style="color:var(--text-muted); margin:4px 0 0; font-size:0.9rem;">Connect with our accomplished alumni — reach out & get inspired</p>
      </div>
    </div>

    <!-- Stats Banner -->
    <div class="stats-banner">
      <div class="stat-banner-item"><h3>120+</h3><p>Alumni Network</p></div>
      <div class="stat-banner-item"><h3>18</h3><p>Industry Mentors</p></div>
      <div class="stat-banner-item"><h3>24</h3><p>Events Completed</p></div>
      <div class="stat-banner-item"><h3>850+</h3><p>Student Interactions</p></div>
    </div>

    <!-- Search -->
    <div class="search-bar-wrap">
      <i class="fa-solid fa-search"></i>
      <input type="text" id="alumni-search" placeholder="Search alumni by name or company..." />
    </div>

    <!-- Grid -->
    <div class="alumni-grid" id="alumni-grid-container">
      <div class="empty-state">
        <i class="fa-solid fa-spinner fa-spin" style="opacity:1; color:var(--primary);"></i>
        <p>Loading alumni...</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:')
      ? 'http://localhost:5000'
      : 'https://campuscare-backend-96cn.onrender.com';

    // Campus WhatsApp group (fallback when alumni has no phone)
    const CAMPUS_WA_GROUP = 'https://chat.whatsapp.com/CampusAECAlumni';

    let allAlumni = [];

    function buildWaLink(phone, name) {
      if (phone) {
        const cleaned = phone.replace(/\D/g, '');
        const num = cleaned.startsWith('91') ? cleaned : `91${cleaned}`;
        const msg = encodeURIComponent(`Hi ${name}, I found your profile on CampusCare (AEC Alumni Network). I'd love to connect!`);
        return `https://wa.me/${num}?text=${msg}`;
      }
      return CAMPUS_WA_GROUP;
    }

    function renderAlumni(list) {
      const grid = document.getElementById('alumni-grid-container');
      if (!list.length) {
        grid.innerHTML = '<div class="empty-state"><i class="fa-solid fa-users-slash"></i><p>No alumni found.</p></div>';
        return;
      }
      grid.innerHTML = list.map(a => {
        const name = a.user ? a.user.name : (a.name || 'Alumni');
        const avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6b46c1&color=fff&size=100&bold=true`;
        const job = a.jobTitle || 'Professional';
        const company = a.currentCompany || 'Industry';
        const about = a.about || 'Proud alumni of Asansol Engineering College.';
        const year = a.graduationYear || a.passingYear || '';
        const waLink = buildWaLink(a.phone || (a.user && a.user.phone), name);

        return `
          <div class="alumni-card">
            <img class="alumni-avatar" src="${a.photo || avatar}" alt="${name}"
              onerror="this.src='${avatar}'" />
            ${year ? `<span class="alumni-year-badge">Batch of ${year}</span>` : ''}
            <div class="alumni-name">${name}</div>
            <div class="alumni-role">${job}</div>
            <div class="alumni-company"><i class="fa-solid fa-building" style="margin-right:4px;"></i>${company}</div>
            <p class="alumni-quote">"${about}"</p>
            <a href="${waLink}" target="_blank" rel="noopener" class="wa-btn">
              <i class="fa-brands fa-whatsapp" style="font-size:1.1rem;"></i>
              Connect on WhatsApp
            </a>
          </div>`;
      }).join('');
    }

    document.getElementById('alumni-search').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allAlumni.filter(a => {
        const name = (a.user ? a.user.name : a.name || '').toLowerCase();
        const company = (a.currentCompany || '').toLowerCase();
        return name.includes(term) || company.includes(term);
      });
      renderAlumni(filtered);
    });

    (async () => {
      try {
        const res = await fetch(`${API_BASE}/api/alumni`);
        if (!res.ok) throw new Error('API error');
        allAlumni = await res.json();
      } catch (e) {
        allAlumni = [
          { name: 'Ahmad Raza', jobTitle: 'Software Engineer', currentCompany: 'Google', about: 'Hard work, consistency and curiosity will take you places.', graduationYear: 2020 },
          { name: 'Priya Sharma', jobTitle: 'Data Scientist', currentCompany: 'Microsoft', about: 'Never stop learning — the world changes faster than you think.', graduationYear: 2019 },
          { name: 'Rohan Mehta', jobTitle: 'Full Stack Developer', currentCompany: 'Infosys', about: 'Build things that matter and never shy away from challenges.', graduationYear: 2021 },
          { name: 'Sneha Patel', jobTitle: 'Product Manager', currentCompany: 'Amazon', about: 'Communication and teamwork are as important as technical skills.', graduationYear: 2018 },
          { name: 'Vikram Singh', jobTitle: 'DevOps Engineer', currentCompany: 'IBM', about: 'Automate everything you can — that is the future.', graduationYear: 2020 },
          { name: 'Ananya Das', jobTitle: 'UX Designer', currentCompany: 'Adobe', about: 'Design is not just visual — it is about solving real human problems.', graduationYear: 2022 },
        ];
      }
      renderAlumni(allAlumni);
    })();
  </script>
</body>
</html>
