<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Department Complaints | HOD Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        .btn-action {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .resolve {
            background: #10b981;
            color: white;
        }

        .resolve:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-action:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body>
    <header class="glass"
        style="position: sticky; top: 20px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; margin: 0 auto; width: 95%; max-width: 1400px; border-radius: 16px;">
        <a href="index.html" class="logo" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
            <i class="fa-solid fa-graduation-cap"></i> CampusCare <span
                style="font-size:0.8rem; background:#3b82f6; color:white; padding:2px 8px; border-radius:10px;">HOD</span>
        </a>
        <div><a href="index.html" style="text-decoration:none; color:#2d3748; font-weight:600;">Dashboard</a></div>
    </header>
    <main class="main-container">
        <section class="hero teacher-hero" style="background: transparent;">
            <div class="hero-left">
                <h1 class="hero-title" style="color:#2d3748;">Complaint Oversight</h1>
                <p class="hero-sub" style="color:#4a5568;">Review escalated issues</p>
            </div>
        </section>
        <section class="standard-container">
            <div style="background:white; padding:2rem; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.04); border:1px solid #f1f5f9;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div>
                        <h2 style="color: #1e293b; margin: 0; font-size: 1.5rem;">Recent Complaints</h2>
                        <p style="color: #64748b; margin: 5px 0 0 0; font-size: 0.9rem;">Overview of department issues and escalations</p>
                    </div>
                    <div style="position: relative;">
                        <input type="text" id="complaintSearch" placeholder="Search complaints..." 
                               style="padding: 10px 15px 10px 40px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 0.9rem; width: 300px; outline: none; transition: all 0.3s;">
                        <i class="fa-solid fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8;"></i>
                    </div>
                </div>

                <div style="overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse; min-width:900px;">
                        <thead>
                            <tr style="text-align:left; color:#64748b; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.05em; border-bottom:1px solid #f1f5f9;">
                                <th style="padding:1rem 1.5rem; font-weight:700;">Student</th>
                                <th style="padding:1rem 1.5rem; font-weight:700;">Title</th>
                                <th style="padding:1rem 1.5rem; font-weight:700;">Category</th>
                                <th style="padding:1rem 1.5rem; font-weight:700; text-align:center;">Proof (Before / After)</th>
                                <th style="padding:1rem 1.5rem; font-weight:700;">Status</th>
                                <th style="padding:1rem 1.5rem; font-weight:700;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="complaintsTableBody">
                            <!-- Table Rows injected by JS -->
                            <tr>
                                <td colspan="6" style="text-align:center; padding:4rem;">
                                    <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem; color:#3b82f6; margin-bottom:1rem;"></i>
                                    <p style="color:#64748b;">Loading department complaints...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <script src="../assets/js/hod_complaints.js"></script>
    </main>
</body>

</html>
