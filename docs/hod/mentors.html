<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mentor Assignment | HOD Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body>
    <header class="glass"
        style="position: sticky; top: 20px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; margin: 0 auto; width: 95%; max-width: 1400px; border-radius: 16px;">
        <a href="index.html" class="logo" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
            <i class="fa-solid fa-graduation-cap"></i> CampusCare <span
                style="font-size:0.8rem; background:#7c3aed; color:white; padding:2px 8px; border-radius:10px;">HOD</span>
        </a>

        <div style="display:flex; align-items:center; gap: 15px;">
            <div id="userProfile"
                style="display: none; align-items: center; gap: 15px; position: relative; cursor: pointer;">
                <a href="index.html" class="dashboard-btn-nav">Dashboard</a>
                <span id="userName" style="font-weight: 600; color: #2d3748;">Hello, HOD</span>
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=HOD&background=random" alt="Profile"
                    style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ccc;"
                    onclick="toggleProfileMenu()">
                <div id="profileMenu" class="glass"
                    style="display: none; position: absolute; top: 50px; right: 0; flex-direction: column; width: 220px; padding: 1rem; background: white; z-index: 2000; text-align: left; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                    <p id="userDetails" style="font-size: 0.85rem; color: #666; margin-bottom: 1rem; line-height: 1.4;">
                    </p>
                    <button onclick="logout()"
                        style="background: #ef4444; color: white; border: none; padding: 0.5rem; width: 100%; border-radius: 5px; cursor: pointer; font-weight: 500;">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <section class="hero teacher-hero" style="background: transparent; text-align: center; margin-top: 0.5rem; margin-bottom: 2rem;">
            <div style="max-width: 800px; margin: 0 auto;">
                <h1 class="hero-title" style="color:#2d3748; font-size: 2.5rem; margin-bottom: 0.5rem;">Mentor Assignment</h1>
                <p class="hero-sub" style="color:#64748b; font-size: 1.1rem; margin-bottom: 1rem;">Assign Mentees to Faculty</p>
            </div>
        </section>

        <section class="standard-container">
            <div style="background:white; padding:1.5rem; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap: wrap; gap: 1rem;">
                    <div>
                        <h3 style="color:#2d3748; margin-bottom:5px;">Mentor Assignment</h3>
                        <p style="color:#64748b; font-size:0.9rem;">Assign a faculty mentor to each student.</p>
                    </div>

                    <select id="mentorYearFilter" class="filter-select" onchange="loadStudentsForMentorship()" style="padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0;">
                        <option value="4th Year">4th Year (2026)</option>
                        <option value="3rd Year">3rd Year (2027)</option>
                        <option value="2nd Year">2nd Year (2028)</option>
                        <option value="1st Year">1st Year (2029)</option>
                    </select>
                </div>

                <div class="batches-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:1rem;">
                    <!-- Batch 1-1 -->
                    <div style="background:#f8fafc; padding:1rem; border-radius:12px; border:1px solid #e2e8f0;">
                        <h4
                            style="margin-bottom:1rem; color:#1e40af; border-bottom:2px solid #bfdbfe; padding-bottom:0.5rem; text-align:center;">
                            Batch 1-1
                        </h4>
                        <div id="batch11List" class="student-list" style="min-height:200px;">
                            <div style="text-align:center; color:#94a3b8; font-size:0.8rem;">Loading...</div>
                        </div>
                    </div>

                    <!-- Batch 1-2 -->
                    <div style="background:#f8fafc; padding:1rem; border-radius:12px; border:1px solid #e2e8f0;">
                        <h4
                            style="margin-bottom:1rem; color:#1e40af; border-bottom:2px solid #bfdbfe; padding-bottom:0.5rem; text-align:center;">
                            Batch 1-2
                        </h4>
                        <div id="batch12List" class="student-list" style="min-height:200px;">
                            <div style="text-align:center; color:#94a3b8; font-size:0.8rem;">Loading...</div>
                        </div>
                    </div>

                    <!-- Batch 2-1 -->
                    <div style="background:#f8fafc; padding:1rem; border-radius:12px; border:1px solid #e2e8f0;">
                        <h4
                            style="margin-bottom:1rem; color:#1e40af; border-bottom:2px solid #bfdbfe; padding-bottom:0.5rem; text-align:center;">
                            Batch 2-1
                        </h4>
                        <div id="batch21List" class="student-list" style="min-height:200px;">
                            <div style="text-align:center; color:#94a3b8; font-size:0.8rem;">Loading...</div>
                        </div>
                    </div>

                    <!-- Batch 2-2 -->
                    <div style="background:#f8fafc; padding:1rem; border-radius:12px; border:1px solid #e2e8f0;">
                        <h4
                            style="margin-bottom:1rem; color:#1e40af; border-bottom:2px solid #bfdbfe; padding-bottom:0.5rem; text-align:center;">
                            Batch 2-2
                        </h4>
                        <div id="batch22List" class="student-list" style="min-height:200px;">
                            <div style="text-align:center; color:#94a3b8; font-size:0.8rem;">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Teacher Selection Modal -->
        <div id="assignMentorModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="assignModalTitle">Assign Mentor</h2>
                    <span class="close-modal-btn"
                        onclick="document.getElementById('assignMentorModal').style.display='none'">&times;</span>
                </div>
                <div class="modal-body">
                    <input type="text" id="teacherSearch" placeholder="Search Teacher..."
                        style="width:100%; padding:0.8rem; margin-bottom:1rem; border:1px solid #cbd5e1; border-radius:8px;">

                    <div id="teacherList"
                        style="max-height:300px; overflow-y:auto; display:flex; flex-direction:column; gap:8px;">
                        <!-- Teacher Items populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/landing.js"></script>
    <script src="../assets/js/hod_mentors.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('user');
            if (userStr) {
                const user = JSON.parse(userStr);
                if (user.role === 'hod' || user.role === 'admin') {
                    document.getElementById('userProfile').style.display = 'flex';
                    document.getElementById('userName').innerText = `Hello, ${user.name}`;
                    document.getElementById('userDetails').innerHTML = `<strong>${user.role.toUpperCase()}</strong><br>${user.email}<br>Dept: ${user.department || 'N/A'}`;
                    document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?name=${user.name}&background=random`;
                }
            }
        });

        function toggleProfileMenu() {
            const menu = document.getElementById('profileMenu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }
    </script>
</body>

</html>
