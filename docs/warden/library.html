<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Library Access | Warden Portal | CampusCare</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/design-system.css?v=1.6">
  <style>
      .fa-solid, .fas { font-family: "Font Awesome 6 Free" !important; }

      .search-bar-container {
          display: flex;
          gap: 15px;
          background: var(--bg-color);
          padding: 1.5rem;
          border-radius: var(--radius-lg);
          border: 1px solid var(--border-color);
          align-items: center;
          flex-wrap: wrap;
      }

      .search-input-wrapper {
          flex: 1;
          min-width: 250px;
          position: relative;
      }

      .search-input-wrapper i {
          position: absolute;
          left: 16px;
          top: 50%;
          transform: translateY(-50%);
          color: var(--text-muted);
      }

      .search-input-wrapper input {
          width: 100%;
          padding: 12px 16px 12px 45px;
          border: 1px solid var(--border-color);
          border-radius: var(--radius-md);
          font-family: 'Inter', sans-serif;
          font-size: 1rem;
          outline: none;
          transition: border-color 0.2s;
          background: var(--bg-color);
          color: var(--text-dark);
      }

      .search-input-wrapper input:focus {
          border-color: var(--primary);
          box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
      }

      .filter-select {
          padding: 12px 16px;
          border: 1px solid var(--border-color);
          border-radius: var(--radius-md);
          font-family: 'Inter', sans-serif;
          font-size: 1rem;
          outline: none;
          background: var(--bg-color);
          color: var(--text-dark);
          min-width: 180px;
          cursor: pointer;
      }
      
      .book-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
          gap: 2rem;
      }
  </style>
</head>

<body>
  <div class="dashboard-wrapper modern-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <a href="../index.html" class="logo-container">
        <img src="../assets/images/hero-illustration.png" alt="Logo" class="logo-icon"
          onerror="this.src='https://ui-avatars.com/api/?name=CC&background=10b981&color=fff&rounded=true'" />
        <div class="logo-text">CampusCare</div>
      </a>

      <div class="sidebar-portal-text"
        style="padding: 0 24px; margin-bottom: 8px; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">
        Warden Portal
      </div>

      <ul class="nav-menu">
        <li><a href="index.html" class="nav-item"><i class="fa-solid fa-house-chimney"></i> Dashboard</a></li>
        <li>
            <a href="leaves.html" class="nav-item" style="display: flex; justify-content: space-between; align-items: center;">
                <span><i class="fa-solid fa-stamp"></i> Leave Approvals</span>
                <span id="leaveCountBadgeSidebar" style="background: #fee2e2; color: #ef4444; padding: 2px 6px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; display: none;">0</span>
            </a>
        </li>
        <li><a href="complaints.html" class="nav-item"><i class="fa-solid fa-triangle-exclamation"></i> Complaints</a></li>
        <li><a href="mess_menu.html" class="nav-item"><i class="fa-solid fa-utensils"></i> Mess Menu</a></li>
        <li><a href="students.html" class="nav-item"><i class="fa-solid fa-users"></i> Residents</a></li>
        <li><a href="notices.html" class="nav-item"><i class="fa-solid fa-bullhorn"></i> Notice Board</a></li>
        <li><a href="library.html" class="nav-item active"><i class="fa-solid fa-book-open"></i> Library</a></li>
      </ul>

      <div class="sidebar-bottom">
        <a id="logoutBtn" href="javascript:void(0)" class="nav-item" data-action="logout"
          style="color: var(--danger);"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- TOP NAVBAR -->
      <header class="top-navbar">
        <div class="nav-left" style="display: flex; align-items: center; gap: 32px">
          <h1 style="margin: 0; font-size: 1.8rem; font-weight: 700; color: var(--text-dark);">
            CampusCare <span style="font-size: 0.8rem; background: var(--success); color: white; padding: 4px 10px; border-radius: var(--radius-full); vertical-align: middle; margin-left: 8px;">Warden</span>
          </h1>
        </div>

        <div class="nav-right" style="display: flex; align-items: center; gap: 20px">
          <a href="index.html" class="btn-dashboard"><i class="fa-solid fa-house-chimney"></i> Dashboard</a>
          <!-- USER PROFILE -->
          <div id="userProfile" class="user-profile" data-action="toggleProfileMenu" aria-label="Toggle Profile Menu" aria-expanded="false" aria-haspopup="menu"
            style="display: flex; cursor: pointer; position: relative">
            <img id="userAvatar" class="user-avatar" src="https://ui-avatars.com/api/?name=Warden&background=random" alt="Profile" />
            <div style="display: flex; flex-direction: column;">
              <span id="userName" class="user-name" style="cursor: pointer; margin-bottom: 2px;">Hello, Warden</span>
              <span id="userRole" style="font-size: 0.75rem; color: var(--text-muted);">Hostel Admin</span>
            </div>

            <!-- DROPDOWN MENU -->
            <div id="profileMenu"
              style="display: none; position: absolute; top: calc(100% + 10px); right: 0; background: var(--bg-color); padding: 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); z-index: 1000; border: 1px solid var(--border-color); animation: fadeIn 0.2s ease; min-width: 250px;">
              <p style="border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">
                Account Details
              </p>
              <div id="userDetails" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.5;">
                  <!-- Injected by JS -->
              </div>
              <button style="background: var(--danger); color: white; border: none; padding: 0.6rem; width: 100%; border-radius: var(--radius-md); cursor: pointer; font-weight: 500;">
                  <i class="fa-solid fa-right-from-bracket"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- HERO -->
      <section class="hero-card" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white;">
        <div class="hero-content" style="max-width: 100%;">
          <h1 style="font-size: 2rem; margin-bottom: 8px; color: white;">Library Access</h1>
          <p style="font-size: 1rem; opacity: 0.9; margin: 0;">Search Books & Resources</p>
        </div>
      </section>

      <!-- SEARCH BAR -->
      <div class="search-bar-container" style="margin-bottom: 2rem;">
          <div class="search-input-wrapper">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="searchInput" placeholder="Search by Title, Author or ISBN...">
          </div>

          <select id="categoryFilter" class="filter-select">
              <option value="All">All Categories</option>
              <option value="CSE">Computer Science</option>
              <option value="IT">Information Tech</option>
              <option value="ECE">Electronics</option>
              <option value="CIVIL">Civil Engineering</option>
              <option value="General">General Reading</option>
          </select>

          <button class="btn-filled-purple" style="background: var(--primary); padding: 12px 24px;">
              <i class="fa-solid fa-search" style="margin-right: 8px;"></i> Search
          </button>
      </div>

      <!-- BOOK GRID -->
      <section class="section-card">
          <div id="bookList" class="book-grid">
              <!-- Dynamic Content Will Be Loaded Here -->
              <div style="grid-column: 1/-1; text-align:center; padding:4rem; color:var(--text-muted); background: var(--bg-color); border-radius: var(--radius-lg); border: 1px dashed var(--border-color);">
                  <i class="fa-solid fa-book" style="font-size: 2rem; color: var(--border-color); margin-bottom: 1rem;"></i>
                  <p>Loading books database...</p>
              </div>
          </div>
      </section>

    </main>
  </div>

  <script src="../assets/js/landing.js"></script>
  <script src="../assets/js/warden.js"></script>
  <script src="../assets/js/library.js"></script>
  <script>
      // Profile menu toggle logic
      document.querySelector('[data-action="toggleProfileMenu"]').addEventListener('click', function(e) {
          e.stopPropagation();
          const menu = document.getElementById('profileMenu');
          menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
      });
      document.addEventListener('click', function(e) {
          const menu = document.getElementById('profileMenu');
          if (menu && menu.style.display === 'block' && !e.target.closest('#userProfile')) {
              menu.style.display = 'none';
          }
      });
  </script>
</body>

</html>
