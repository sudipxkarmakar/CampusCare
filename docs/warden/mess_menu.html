<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mess Menu | Warden Portal | CampusCare</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/design-system.css?v=1.6">
  <style>
      .fa-solid, .fas { font-family: "Font Awesome 6 Free" !important; }
      
      .days-nav {
          display: flex;
          overflow-x: auto;
          background: var(--bg-color);
          border-bottom: 1px solid var(--border-color);
          margin: -1.5rem -1.5rem 1.5rem -1.5rem; /* negate section-card padding to make it full width */
          padding: 0 1.5rem;
      }
      
      .day-tab {
          padding: 1rem 1.5rem;
          background: transparent;
          border: none;
          cursor: pointer;
          font-weight: 600;
          font-family: 'Inter', sans-serif;
          color: var(--text-muted);
          border-bottom: 3px solid transparent;
          transition: all 0.2s;
          white-space: nowrap;
      }

      .day-tab:hover {
          color: var(--primary);
          background: var(--primary-light);
      }

      .day-tab.active {
          color: var(--primary);
          border-bottom-color: var(--primary);
          background: white;
      }

      .menu-input {
          width: 100%;
          padding: 1rem;
          border: 1px solid var(--border-color);
          border-radius: var(--radius-md);
          outline: none;
          font-family: 'Inter', sans-serif;
          font-size: 0.95rem;
          resize: vertical;
          transition: border-color 0.2s;
          background: var(--bg-color);
          color: var(--text-dark);
      }

      .menu-input:focus {
          border-color: var(--primary);
          box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
      }
      
      .meal-group {
          background: var(--bg-color);
          padding: 1.5rem;
          border-radius: var(--radius-md);
          border: 1px solid var(--border-color);
      }
      
      .meal-label {
          display: flex;
          align-items: center;
          gap: 10px;
          font-weight: 600;
          color: var(--text-dark);
          margin-bottom: 1rem;
          font-size: 1.1rem;
      }
  </style>
</head>

<body>
  <div class="dashboard-wrapper modern-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <a href="../index.html" class="logo-container">
        <img src="../assets/images/hero-illustration.png" alt="Logo" class="logo-icon"
          onerror="this.src='https://ui-avatars.com/api/?name=CC&background=10b981&color=fff&rounded=true'" />
        <div class="logo-text">CampusCare</div>
      </a>

      <div class="sidebar-portal-text"
        style="padding: 0 24px; margin-bottom: 8px; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">
        Warden Portal
      </div>

      <ul class="nav-menu">
        <li><a href="index.html" class="nav-item"><i class="fa-solid fa-house-chimney"></i> Dashboard</a></li>
        <li>
            <a href="leaves.html" class="nav-item" style="display: flex; justify-content: space-between; align-items: center;">
                <span><i class="fa-solid fa-stamp"></i> Leave Approvals</span>
                <span id="leaveCountBadgeSidebar" style="background: #fee2e2; color: #ef4444; padding: 2px 6px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; display: none;">0</span>
            </a>
        </li>
        <li><a href="complaints.html" class="nav-item"><i class="fa-solid fa-triangle-exclamation"></i> Complaints</a></li>
        <li><a href="mess_menu.html" class="nav-item active"><i class="fa-solid fa-utensils"></i> Mess Menu</a></li>
        <li><a href="students.html" class="nav-item"><i class="fa-solid fa-users"></i> Residents</a></li>
        <li><a href="notices.html" class="nav-item"><i class="fa-solid fa-bullhorn"></i> Notice Board</a></li>
        <li><a href="library.html" class="nav-item"><i class="fa-solid fa-book-open"></i> Library</a></li>
      </ul>

      <div class="sidebar-bottom">
        <a id="logoutBtn" href="javascript:void(0)" class="nav-item" data-action="logout"
          style="color: var(--danger);"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- TOP NAVBAR -->
      <header class="top-navbar">
        <div class="nav-left" style="display: flex; align-items: center; gap: 32px">
          <h1 style="margin: 0; font-size: 1.8rem; font-weight: 700; color: var(--text-dark);">
            CampusCare <span style="font-size: 0.8rem; background: var(--success); color: white; padding: 4px 10px; border-radius: var(--radius-full); vertical-align: middle; margin-left: 8px;">Warden</span>
          </h1>
        </div>

        <div class="nav-right" style="display: flex; align-items: center; gap: 20px">
          <a href="index.html" class="btn-dashboard"><i class="fa-solid fa-house-chimney"></i> Dashboard</a>
          <!-- USER PROFILE -->
          <div id="userProfile" class="user-profile" data-action="toggleProfileMenu" aria-label="Toggle Profile Menu" aria-expanded="false" aria-haspopup="menu"
            style="display: flex; cursor: pointer; position: relative">
            <img id="userAvatar" class="user-avatar" src="https://ui-avatars.com/api/?name=Warden&background=random" alt="Profile" />
            <div style="display: flex; flex-direction: column;">
              <span id="userName" class="user-name" style="cursor: pointer; margin-bottom: 2px;">Hello, Warden</span>
              <span id="userRole" style="font-size: 0.75rem; color: var(--text-muted);">Hostel Admin</span>
            </div>

            <!-- DROPDOWN MENU -->
            <div id="profileMenu"
              style="display: none; position: absolute; top: calc(100% + 10px); right: 0; background: var(--bg-color); padding: 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); z-index: 1000; border: 1px solid var(--border-color); animation: fadeIn 0.2s ease; min-width: 250px;">
              <p style="border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">
                Account Details
              </p>
              <div id="userDetails" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.5;">
                  <!-- Injected by JS -->
              </div>
              <button style="background: var(--danger); color: white; border: none; padding: 0.6rem; width: 100%; border-radius: var(--radius-md); cursor: pointer; font-weight: 500;">
                  <i class="fa-solid fa-right-from-bracket"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- HERO -->
      <section class="hero-card" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white;">
        <div class="hero-content" style="max-width: 100%;">
          <h1 style="font-size: 2rem; margin-bottom: 8px; color: white;">Mess Menu Management</h1>
          <p style="font-size: 1rem; opacity: 0.9; margin: 0;">Update Weekly Schedule</p>
        </div>
      </section>

      <!-- CONTENT -->
      <section class="section-card">
          <!-- Days Navigation -->
          <div class="days-nav">
              <button class="day-tab active" onclick="switchDay('Monday')" id="tab-Monday">Monday</button>
              <button class="day-tab" onclick="switchDay('Tuesday')" id="tab-Tuesday">Tuesday</button>
              <button class="day-tab" onclick="switchDay('Wednesday')" id="tab-Wednesday">Wednesday</button>
              <button class="day-tab" onclick="switchDay('Thursday')" id="tab-Thursday">Thursday</button>
              <button class="day-tab" onclick="switchDay('Friday')" id="tab-Friday">Friday</button>
              <button class="day-tab" onclick="switchDay('Saturday')" id="tab-Saturday">Saturday</button>
              <button class="day-tab" onclick="switchDay('Sunday')" id="tab-Sunday">Sunday</button>
          </div>

          <!-- Editor Form -->
          <div>
              <h3 id="currentDayTitle" style="color: var(--text-dark); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; font-size: 1.25rem;">
                  <i class="fa-solid fa-calendar-day" style="color: var(--primary);"></i> Monday Menu
              </h3>

              <form id="menuForm" onsubmit="saveMenu(event)">
                  <input type="hidden" id="currentDayInput" value="Monday">

                  <div class="triple-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">

                      <div class="meal-group">
                          <label class="meal-label">
                              <i class="fa-solid fa-mug-hot" style="color: var(--warning); width: 24px; text-align: center; font-size: 1.2rem;"></i> Breakfast
                          </label>
                          <textarea id="breakfastInput" rows="3" class="menu-input" placeholder="e.g. Idli, Sambar, Chutney, Coffee"></textarea>
                      </div>

                      <div class="meal-group">
                          <label class="meal-label">
                              <i class="fa-solid fa-bowl-rice" style="color: var(--danger); width: 24px; text-align: center; font-size: 1.2rem;"></i> Lunch
                          </label>
                          <textarea id="lunchInput" rows="3" class="menu-input" placeholder="e.g. Rice, Dal, Mixed Veg, Curd"></textarea>
                      </div>

                      <div class="meal-group">
                          <label class="meal-label">
                              <i class="fa-solid fa-cookie-bite" style="color: var(--secondary); width: 24px; text-align: center; font-size: 1.2rem;"></i> Snacks
                          </label>
                          <textarea id="snacksInput" rows="3" class="menu-input" placeholder="e.g. Samosa, Tea"></textarea>
                      </div>

                      <div class="meal-group">
                          <label class="meal-label">
                              <i class="fa-solid fa-utensils" style="color: var(--success); width: 24px; text-align: center; font-size: 1.2rem;"></i> Dinner
                          </label>
                          <textarea id="dinnerInput" rows="3" class="menu-input" placeholder="e.g. Chapati, Paneer Butter Masala, Rice"></textarea>
                      </div>

                  </div>

                  <div style="display: flex; justify-content: flex-end; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                      <button type="submit" class="btn-filled-purple" style="padding: 12px 32px; font-size: 1rem;">
                          <i class="fa-solid fa-save" style="margin-right: 8px;"></i> Save Changes
                      </button>
                  </div>
              </form>
          </div>
      </section>

    </main>
  </div>

  <script src="../assets/js/landing.js"></script>
  <script src="../assets/js/warden_mess.js"></script>
  <script>
      // Profile menu toggle logic
      document.querySelector('[data-action="toggleProfileMenu"]').addEventListener('click', function(e) {
          e.stopPropagation();
          const menu = document.getElementById('profileMenu');
          menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
      });
      document.addEventListener('click', function(e) {
          const menu = document.getElementById('profileMenu');
          if (menu && menu.style.display === 'block' && !e.target.closest('#userProfile')) {
              menu.style.display = 'none';
          }
      });
  </script>
</body>

</html>
