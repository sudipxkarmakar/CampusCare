<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notices | Warden Portal | CampusCare</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/design-system.css?v=1.6">
  <style>
      .fa-solid, .fas { font-family: "Font Awesome 6 Free" !important; }
      
      .form-grid {
          display: grid;
          grid-template-columns: 2fr 1fr;
          gap: 1.5rem;
          margin-bottom: 1.5rem;
      }
      
      @media (max-width: 768px) {
          .form-grid {
              grid-template-columns: 1fr;
          }
      }

      .filter-tabs-container {
          display: flex;
          gap: 10px;
          overflow-x: auto;
          padding-bottom: 5px;
          margin-bottom: 1.5rem;
      }

      .filter-tab {
          padding: 8px 20px;
          border-radius: var(--radius-full);
          border: 1px solid var(--border-color);
          background: var(--bg-color);
          color: var(--text-muted);
          font-family: 'Inter', sans-serif;
          font-weight: 600;
          font-size: 0.9rem;
          cursor: pointer;
          transition: all 0.2s;
          white-space: nowrap;
      }

      .filter-tab:hover {
          background: var(--bg-hover);
          color: var(--text-dark);
      }

      .filter-tab.active {
          background: var(--primary);
          color: white;
          border-color: var(--primary);
          box-shadow: 0 4px 6px -1px rgba(124, 58, 237, 0.3);
      }

      .notice-list {
          display: flex;
          flex-direction: column;
          gap: 1.25rem;
      }
  </style>
</head>

<body>
  <div class="dashboard-wrapper modern-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <a href="../index.html" class="logo-container">
        <img src="../assets/images/hero-illustration.png" alt="Logo" class="logo-icon"
          onerror="this.src='https://ui-avatars.com/api/?name=CC&background=10b981&color=fff&rounded=true'" />
        <div class="logo-text">CampusCare</div>
      </a>

      <div class="sidebar-portal-text"
        style="padding: 0 24px; margin-bottom: 8px; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">
        Warden Portal
      </div>

      <ul class="nav-menu">
        <li><a href="index.html" class="nav-item"><i class="fa-solid fa-house-chimney"></i> Dashboard</a></li>
        <li>
            <a href="leaves.html" class="nav-item" style="display: flex; justify-content: space-between; align-items: center;">
                <span><i class="fa-solid fa-stamp"></i> Leave Approvals</span>
                <span id="leaveCountBadgeSidebar" style="background: #fee2e2; color: #ef4444; padding: 2px 6px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; display: none;">0</span>
            </a>
        </li>
        <li><a href="complaints.html" class="nav-item"><i class="fa-solid fa-triangle-exclamation"></i> Complaints</a></li>
        <li><a href="mess_menu.html" class="nav-item"><i class="fa-solid fa-utensils"></i> Mess Menu</a></li>
        <li><a href="students.html" class="nav-item"><i class="fa-solid fa-users"></i> Residents</a></li>
        <li><a href="notices.html" class="nav-item active"><i class="fa-solid fa-bullhorn"></i> Notice Board</a></li>
        <li><a href="library.html" class="nav-item"><i class="fa-solid fa-book-open"></i> Library</a></li>
      </ul>

      <div class="sidebar-bottom">
        <a id="logoutBtn" href="javascript:void(0)" class="nav-item" data-action="logout"
          style="color: var(--danger);"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- TOP NAVBAR -->
      <header class="top-navbar">
        <div class="nav-left" style="display: flex; align-items: center; gap: 32px">
          <h1 style="margin: 0; font-size: 1.8rem; font-weight: 700; color: var(--text-dark);">
            CampusCare <span style="font-size: 0.8rem; background: var(--success); color: white; padding: 4px 10px; border-radius: var(--radius-full); vertical-align: middle; margin-left: 8px;">Warden</span>
          </h1>
        </div>

        <div class="nav-right" style="display: flex; align-items: center; gap: 20px">
          <!-- USER PROFILE -->
          <div id="userProfile" class="user-profile" data-action="toggleProfileMenu" aria-label="Toggle Profile Menu" aria-expanded="false" aria-haspopup="menu"
            style="display: flex; cursor: pointer; position: relative">
            <img id="userAvatar" class="user-avatar" src="https://ui-avatars.com/api/?name=Warden&background=random" alt="Profile" />
            <div style="display: flex; flex-direction: column;">
              <span id="userName" class="user-name" style="cursor: pointer; margin-bottom: 2px;">Hello, Warden</span>
              <span id="userRole" style="font-size: 0.75rem; color: var(--text-muted);">Hostel Admin</span>
            </div>

            <!-- DROPDOWN MENU -->
            <div id="profileMenu"
              style="display: none; position: absolute; top: calc(100% + 10px); right: 0; background: var(--bg-color); padding: 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); z-index: 1000; border: 1px solid var(--border-color); animation: fadeIn 0.2s ease; min-width: 250px;">
              <p style="border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem;">
                Account Details
              </p>
              <div id="userDetails" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.5;">
                  <!-- Injected by JS -->
              </div>
              <button style="background: var(--danger); color: white; border: none; padding: 0.6rem; width: 100%; border-radius: var(--radius-md); cursor: pointer; font-weight: 500;">
                  <i class="fa-solid fa-right-from-bracket"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- HERO -->
      <section class="hero-card" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white;">
        <div class="hero-content" style="max-width: 100%;">
          <h1 style="font-size: 2rem; margin-bottom: 8px; color: white;">Notice Board</h1>
          <p style="font-size: 1rem; opacity: 0.9; margin: 0;">Broadcast and view important announcements</p>
        </div>
      </section>

      <div class="workspace-layout">
          <!-- LEFT COLUMN: CREATE NOTICE -->
          <div class="workspace-main">
              <section class="section-card">
                  <h3 style="margin-bottom:1.5rem; color:var(--text-dark); display: flex; align-items: center; gap: 8px; font-size: 1.25rem;">
                      <i class="fa-solid fa-pen-to-square" style="color: var(--primary);"></i> Post New Notice
                  </h3>

                  <div class="form-grid">
                      <div class="form-group" style="margin: 0;">
                          <input type="text" id="notice-title" class="form-input" placeholder="Notice Title">
                      </div>

                      <div class="form-group" style="margin: 0;">
                          <select id="notice-audience" class="form-input" style="appearance: auto;">
                              <option value="hosteler">Hostelers Only</option>
                              <option value="student">All Students</option>
                              <option value="teacher">All Teachers</option>
                              <option value="hod">HODs Only</option>
                              <option value="principal">Principal Only</option>
                              <option value="warden">Wardens Only</option>
                              <option value="general">General (Entire College)</option>
                          </select>
                      </div>
                  </div>

                  <div class="form-group" style="margin-bottom: 1.5rem;">
                      <textarea id="notice-content" class="form-input" placeholder="Write your notice details here..." rows="4" style="resize: vertical;"></textarea>
                  </div>

                  <div style="display: flex; justify-content: flex-end;">
                      <button onclick="postNotice()" class="btn-filled-purple" style="background: var(--success); padding: 10px 24px;">
                          <i class="fa-solid fa-paper-plane" style="margin-right: 8px;"></i> Post Notice
                      </button>
                  </div>
              </section>
          </div>

          <!-- RIGHT COLUMN: NOTICES LIST -->
          <div class="workspace-sidebar">
              <section class="section-card">
                  
                  <div class="filter-tabs-container">
                      <button class="filter-tab active" onclick="filterNotices('all', this)">All</button>
                      <button class="filter-tab" onclick="filterNotices('hosteler', this)">Hostelers</button>
                      <button class="filter-tab" onclick="filterNotices('student', this)">Students</button>
                      <button class="filter-tab" onclick="filterNotices('teacher', this)">Teachers</button>
                      <button class="filter-tab" onclick="filterNotices('general', this)">General</button>
                  </div>

                  <div id="notices-list" class="notice-list">
                      <!-- Notices will be loaded here -->
                      <div style="text-align:center; padding: 3rem 1rem; color: var(--text-muted); background: var(--bg-color); border-radius: var(--radius-md); border: 1px dashed var(--border-color);">
                          <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 1.5rem; margin-bottom: 1rem; color: var(--border-color);"></i>
                          <p>Loading notices...</p>
                      </div>
                  </div>
              </section>
          </div>
      </div>

    </main>
  </div>

  <script src="warden_notices.js"></script>
  <script>
      // Profile menu toggle logic
      document.querySelector('[data-action="toggleProfileMenu" aria-label="Toggle Profile Menu" aria-expanded="false" aria-haspopup="menu"]').addEventListener('click', function(e) {
          e.stopPropagation();
          const menu = document.getElementById('profileMenu');
          menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
      });
      document.addEventListener('click', function(e) {
          const menu = document.getElementById('profileMenu');
          if (menu && menu.style.display === 'block' && !e.target.closest('#userProfile')) {
              menu.style.display = 'none';
          }
      });
  </script>
</body>

</html>
