<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Notices | CampusCare</title>
  <meta name="description" content="Browse all campus notices, announcements and events at Asansol Engineering College." />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/design-system.css?v=1.4" />
  <style>
    body { background: #e2e8f0 !important; padding: 0 !important; }
    .page-wrap { max-width: 1300px; margin: 0 auto; padding: 40px 32px; }
    .page-header {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 36px; flex-wrap: wrap;
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--primary-light); color: var(--primary);
      padding: 10px 20px; border-radius: var(--radius-full);
      text-decoration: none; font-weight: 600; font-size: 0.9rem;
      transition: all 0.2s; white-space: nowrap;
    }
    .back-btn:hover { background: var(--primary); color: white; }
    .page-title { font-size: 1.8rem; font-weight: 700; color: var(--text-dark); }
    .page-title span { color: var(--primary); }
    .search-filter-bar {
      display: flex; gap: 16px; align-items: center;
      margin-bottom: 32px; flex-wrap: wrap;
    }
    .search-wrap {
      position: relative; flex: 1; min-width: 220px;
    }
    .search-wrap input {
      width: 100%; padding: 12px 20px 12px 44px;
      border: 1px solid var(--border-color); border-radius: var(--radius-full);
      font-size: 0.95rem; outline: none; background: white;
      font-family: inherit; transition: border 0.2s;
    }
    .search-wrap input:focus { border-color: var(--primary); }
    .search-wrap i {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted);
    }
    .filter-btn {
      padding: 10px 18px; border-radius: var(--radius-full);
      border: 1px solid var(--border-color); background: white;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s; color: var(--text-muted);
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--primary); color: white; border-color: var(--primary);
    }
    .notices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .notice-card {
      background: white; border-radius: var(--radius-lg); padding: 24px;
      box-shadow: var(--shadow-md); border: 1px solid var(--border-color);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column; gap: 12px;
    }
    .notice-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .notice-card-icon {
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .notice-card-title { font-size: 1rem; font-weight: 700; margin: 0; }
    .notice-card-body { font-size: 0.88rem; color: var(--text-muted); line-height: 1.5; flex: 1; }
    .notice-card-footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; color: var(--text-muted); padding-top: 12px;
      border-top: 1px solid var(--border-color);
    }
    .notice-type-tag {
      padding: 3px 10px; border-radius: var(--radius-full);
      font-size: 0.75rem; font-weight: 600;
    }
    .empty-state {
      grid-column: 1 / -1; text-align: center; padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; display: block; }
    .stats-row-mini {
      display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap;
    }
    .stat-mini {
      background: white; border-radius: var(--radius-md); padding: 16px 24px;
      box-shadow: var(--shadow-sm); display: flex; gap: 12px; align-items: center;
    }
    .stat-mini-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    }
    .stat-mini-info h4 { margin: 0; font-size: 1.2rem; }
    .stat-mini-info p { margin: 0; font-size: 0.78rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="page-wrap">
    <!-- Header -->
    <div class="page-header">
      <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
      </a>
      <div>
        <h1 class="page-title"><i class="fa-solid fa-bullhorn" style="color:var(--primary);"></i> Campus <span>Notice Board</span></h1>
        <p style="color:var(--text-muted); margin:4px 0 0; font-size:0.9rem;">All announcements, events & updates from AEC</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row-mini" id="notice-stats">
      <div class="stat-mini">
        <div class="stat-mini-icon" style="background:#dbeafe; color:#1d4ed8;"><i class="fa-solid fa-bell"></i></div>
        <div class="stat-mini-info"><h4 id="stat-total-notices">â€”</h4><p>Total Notices</p></div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-icon" style="background:#d1fae5; color:#065f46;"><i class="fa-solid fa-calendar-check"></i></div>
        <div class="stat-mini-info"><h4 id="stat-events">â€”</h4><p>Events</p></div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-icon" style="background:#fee2e2; color:#b91c1c;"><i class="fa-solid fa-circle-exclamation"></i></div>
        <div class="stat-mini-info"><h4 id="stat-urgent">â€”</h4><p>Urgent</p></div>
      </div>
    </div>

    <!-- Search + Filter -->
    <div class="search-filter-bar">
      <div class="search-wrap">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="notice-search" placeholder="Search notices..." />
      </div>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="event">Events</button>
      <button class="filter-btn" data-filter="vacation">Vacations</button>
      <button class="filter-btn" data-filter="general">General</button>
    </div>

    <!-- Notice Grid -->
    <div class="notices-grid" id="all-notices-grid">
      <div class="empty-state">
        <i class="fa-solid fa-spinner fa-spin" style="font-size:2.5rem; color:var(--primary); opacity:1;"></i>
        <p>Loading notices...</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:')
      ? 'http://localhost:5000'
      : 'https://campuscare-backend-96cn.onrender.com';

    let allNotices = [];
    let activeFilter = 'all';

    function categorize(n) {
      const t = (n.title + ' ' + (n.content || '')).toLowerCase();
      if (t.includes('vacation') || t.includes('holiday') || t.includes('closed')) return 'vacation';
      if (t.includes('event') || t.includes('competition') || t.includes('tournament') || t.includes('festival') || t.includes('fest')) return 'event';
      if (t.includes('urgent') || t.includes('important') || t.includes('notice')) return 'urgent';
      return 'general';
    }

    function iconForCategory(cat) {
      const map = {
        vacation: { icon: 'fa-umbrella-beach', bg: '#fee2e2', color: '#ef4444' },
        event: { icon: 'fa-trophy', bg: '#e0e7ff', color: '#4f46e5' },
        urgent: { icon: 'fa-circle-exclamation', bg: '#fef3c7', color: '#f59e0b' },
        general: { icon: 'fa-bell', bg: '#d1fae5', color: '#10b981' },
      };
      return map[cat] || map.general;
    }

    function renderNotices(notices) {
      const grid = document.getElementById('all-notices-grid');
      if (!notices.length) {
        grid.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>No notices found.</p></div>';
        return;
      }
      grid.innerHTML = notices.map(n => {
        const cat = categorize(n);
        const ic = iconForCategory(cat);
        const date = new Date(n.date || n.createdAt).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        const tagColors = { vacation: '#fee2e2|#b91c1c', event: '#e0e7ff|#4f46e5', urgent: '#fef3c7|#b45309', general: '#d1fae5|#065f46' };
        const [tagBg, tagColor] = (tagColors[cat] || tagColors.general).split('|');
        return `
          <div class="notice-card">
            <div style="display:flex; align-items:flex-start; gap:14px;">
              <div class="notice-card-icon" style="background:${ic.bg}; color:${ic.color};">
                <i class="fa-solid ${ic.icon}"></i>
              </div>
              <div style="flex:1;">
                <h4 class="notice-card-title">${n.title}</h4>
              </div>
            </div>
            <p class="notice-card-body">${n.content}</p>
            <div class="notice-card-footer">
              <span class="notice-type-tag" style="background:${tagBg}; color:${tagColor};">
                ${cat.charAt(0).toUpperCase() + cat.slice(1)}
              </span>
              <span><i class="fa-regular fa-calendar" style="margin-right:4px;"></i>${date}</span>
            </div>
          </div>`;
      }).join('');
    }

    function applyFilters() {
      const term = document.getElementById('notice-search').value.toLowerCase();
      const filtered = allNotices.filter(n => {
        const matchesSearch = !term || n.title.toLowerCase().includes(term) || (n.content || '').toLowerCase().includes(term);
        const matchesFilter = activeFilter === 'all' || categorize(n) === activeFilter;
        return matchesSearch && matchesFilter;
      });
      renderNotices(filtered);
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        applyFilters();
      });
    });

    // Search
    document.getElementById('notice-search').addEventListener('input', applyFilters);

    // Load notices
    (async () => {
      try {
        const res = await fetch(`${API_BASE}/api/notices?role=public`);
        if (!res.ok) throw new Error('API error');
        allNotices = await res.json();
      } catch (e) {
        // Fallback
        allNotices = [
          { title: 'Semester Exams Schedule', content: 'Final exams begin from Dec 25th. Please check the official routine board for subject-wise timetable.', date: new Date() },
          { title: 'Campus Wi-Fi Maintenance', content: 'Network maintenance scheduled for Saturday 11pmâ€“2am. Services may be temporarily unavailable.', date: new Date(Date.now() - 86400000) },
          { title: 'Cultural Fest 2025', content: 'Annual cultural festival registrations open next week. All students and departments are invited to participate.', date: new Date(Date.now() - 172800000) },
          { title: 'Winter Vacation Notice', content: 'College will remain closed from 25th Dec to 1st Jan for winter vacation. All departments notified.', date: new Date(Date.now() - 259200000) },
          { title: 'Inter-College Basketball Tournament', content: 'Selection trials begin next week at the main court. Interested players report to the sports department.', date: new Date(Date.now() - 345600000) },
          { title: 'Academic Council Meeting', content: 'The academic council meeting is scheduled for 15th December. All HODs must attend.', date: new Date(Date.now() - 432000000) },
        ];
      }

      // Update stats
      const total = allNotices.length;
      const events = allNotices.filter(n => categorize(n) === 'event').length;
      const urgent = allNotices.filter(n => categorize(n) === 'urgent').length;
      document.getElementById('stat-total-notices').textContent = total;
      document.getElementById('stat-events').textContent = events;
      document.getElementById('stat-urgent').textContent = urgent;

      renderNotices(allNotices);
    })();
  </script>
</body>
</html>
